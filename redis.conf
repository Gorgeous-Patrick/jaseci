# Redis configuration for stress testing
# Memory limit: 100MB with LRU eviction policy

# Set maximum memory limit to 100MB
maxmemory 100mb

# Use allkeys-lru eviction policy
# This removes least recently used keys when memory limit is reached
maxmemory-policy allkeys-lru

# Number of samples to check for LRU eviction (default is 5)
# Higher values = more accurate LRU at cost of CPU
maxmemory-samples 5

# Disable RDB persistence (optional - for performance)
save ""

# Disable AOF persistence (optional - for performance)
appendonly no

# Log level
loglevel notice

# Bind to all interfaces (for Docker)
bind 0.0.0.0

# Protected mode off (for Docker/local testing)
protected-mode no

# Port
port 6379
